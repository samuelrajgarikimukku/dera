name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies & Build SPA
      run: |
        npm ci
        npm run build

    - name: Build package
      run: python -m build
      
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
